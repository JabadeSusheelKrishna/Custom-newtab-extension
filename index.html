<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <style>
        .specialfontLow {
            font-family: "Google Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 300;
            font-style: normal;
            font-variation-settings:
                "GRAD" 30;
        }
        .specialfontHigh {
            font-family: "Google Sans", sans-serif;
            font-optical-sizing: auto;
            font-weight: 900;
            font-style: bold;
            font-variation-settings:
                "GRAD" 50;
        }
        .bitcount-grid-double-ink {
            font-family: "Bitcount Grid Double Ink", system-ui;
            font-optical-sizing: auto;
            font-weight: 700;
            font-style: normal;
            font-variation-settings:
                "slnt" 0,
                "CRSV" 0.5,
                "ELSH" 0,
                "ELXP" 0,
                "SZP1" 0,
                "SZP2" 0,
                "XPN1" 0,
                "XPN2" 0,
                "YPN1" 0,
                "YPN2" 0;
        }
        input::placeholder {
            color: rgb(0, 0, 0); /* Or any other color value (HEX, RGB, etc.) */
        }
        :root {
            --bg-dark: #000000;
            --box-bg: rgba(0, 0, 0, 0.05);
            --box-hover: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #000000;
            --accent: #4a90e2;
            --radius: 16px;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }


        /* Main Container */
        .container {
            width: 90%;
            max-width: 1000px;
            text-align: center;
            z-index: 1;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 3rem;
        }

        #search-input {
            width: 100%;
            padding: 18px 30px;
            font-size: 1.2rem;
            background: var(--box-bg);
            border: 1px solid rgba(0, 0, 0, 0.796);
            border-radius: 20px;
            color: white;
            outline: none;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        #search-input:focus {
            background: var(--box-hover);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.2);
        }

        /* Shortcuts Grid */
        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .shortcut {
            background: var(--box-bg);
            padding: 20px;
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.2s ease, background 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(0, 0, 0, 0.79);
        }

        .shortcut:hover {
            background: var(--box-hover);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dim);
        }

        .shortcut:hover .label {
            color: var(--text-main);
        }

        /* Time Display */
        .clock {
            font-size: 6rem;
            margin-bottom: 2rem;
            letter-spacing: -2px;
            opacity: 1;
        }

        .backgroundimage {
            background-image: url("https://cdn.pixabay.com/photo/2025/09/19/05/48/mountain-range-9842371_1280.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(5px);
        }

    </style>
</head>
<body class="backgroundimage">
    <div class="container">
        <div class="clock specialfontHigh" id="clock">00:00</div>

        <form action="https://www.google.com/search" method="get" class="search-container">
            <input type="text" name="q" id="search-input" placeholder="Search the web whatever you want Doraemon!!!" autofocus autocomplete="off">
        </form>

        <div class="shortcuts-grid">
            <a href="https://github.com" class="shortcut">
                <div class="icon"><img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/github-white-icon.png" class="icon"></div>
                <div class="specialfontLow">GitHub</div>
            </a>
            <a href="https://youtube.com" class="shortcut">
                <div class="icon"><img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/youtube-color-icon.png" class="icon"></div>
                <div class="specialfontLow">YouTube</div>
            </a>
            <a href="https://gmail.com" class="shortcut">
                <div class="icon"><img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/gmail-icon.png" class="icon"></div>
                <div class="specialfontLow">Gmail</div>
            </a>
            <a href="https://web.whatsapp.com" class="shortcut">
                <div class="icon"><img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/whatsapp-color-icon.png" class="icon"></div>
                <div class="specialfontLow">Whatsapp</div>
            </a>
            <a href="https://portals.iiit.ac.in" class="shortcut">
                <div class="icon"><img src="https://i.postimg.cc/CKZN9KTv/IIITH-Logo-1-removebg-preview.png" class="icon"></div>
                <div class="specialfontLow">IIIT</div>
            </a>
        </div>
        <div class="shortcuts-grid">
            <a href="https://leetcode.com/" class="shortcut">
                <div class="icon"><img src="https://cdn.iconscout.com/icon/free/png-512/free-leetcode-logo-icon-svg-download-png-2944960.png?f=webp&w=256" class="icon"></div>
                <div class="specialfontLow">leetcode</div>
            </a>
            <a href="https://codeforces.com" class="shortcut">
                <div class="icon"><img src="https://play-lh.googleusercontent.com/zaldniLc2XTBhNlCDR4hcD5bcRYHZ56_lO0yA2Qu-cADShy1_HDWrICSvv0EPTX79WY" class="icon"></div>
                <div class="specialfontLow">Codeforces</div>
            </a>
            <a href="https://outlook.com" class="shortcut">
                <div class="icon"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Microsoft_Outlook_Icon_%282025%E2%80%93present%29.svg/960px-Microsoft_Outlook_Icon_%282025%E2%80%93present%29.svg.png?_=20251003204701" class="icon"></div>
                <div class="specialfontLow">Outlook</div>
            </a>
            <a href="https://chatgpt.com" class="shortcut">
                <div class="icon"><img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/chatgpt-icon.png" class="icon"></div>
                <div class="specialfontLow">ChatGPT</div>
            </a>
            <a href="https://gemini.google.com" class="shortcut">
                <div class="icon"><img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/google-gemini-icon.png" class="icon"></div>
                <div class="specialfontLow">Gemini</div>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
